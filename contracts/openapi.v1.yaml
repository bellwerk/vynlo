openapi: 3.1.0
info:
  title: Vynlo API
  version: 1.0.0
  description: Stable client contract for Vynlo platform. Workspace context is derived from authenticated membership and explicit
    path/header selection; never trusted from arbitrary body fields.
  x-specification-version: 2.1.0
servers:
- url: /api/v1
security:
- bearerAuth: []
tags:
- name: Identity
- name: Inventory
- name: Media
- name: Listings
- name: CRM
- name: Deals
- name: Finance
- name: Payments
- name: Documents
- name: Exports
- name: Operations
- name: Configuration
- name: Settings
- name: Workflows
- name: Tax
- name: Calculations
- name: Reports
- name: Sessions
- name: Parties
paths:
  /me:
    get:
      summary: Get current profile, assurance, and memberships
      tags:
      - Identity
      responses:
        '200':
          description: Current user
      operationId: getMe
  /workspaces:
    get:
      summary: List accessible workspaces
      tags:
      - Identity
      responses:
        '200':
          description: Workspace list
      operationId: getWorkspaces
  /workspace-invitations:
    post:
      operationId: postWorkspaceInvitations
      summary: Create a workspace invitation and queue delivery
      tags:
      - Identity
      responses:
        '200':
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceInvitationCreatedEnvelope'
        '202':
          description: Invitation created and delivery queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceInvitationCreatedEnvelope'
        '400':
          description: Malformed request or command headers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden or recent MFA required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Idempotency or membership conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Invitation validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Command service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceInvitationCreateCommand'
  /workspace-invitations/accept:
    post:
      operationId: postWorkspaceInvitationsAccept
      summary: Accept an invitation for the authenticated confirmed identity
      tags:
      - Identity
      responses:
        '200':
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceInvitationAcceptedEnvelope'
        '201':
          description: Membership created from the invitation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceInvitationAcceptedEnvelope'
        '400':
          description: Malformed request or command headers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated or unconfirmed identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Identity does not match the invitation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Idempotency or existing-membership conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Invitation is invalid, expired, or no longer pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Command service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceInvitationAcceptCommand'

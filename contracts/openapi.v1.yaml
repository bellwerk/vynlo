openapi: 3.1.0
info:
  title: Vynlo API
  version: 1.0.0
  description: Stable client contract for Vynlo platform. Workspace context is derived from authenticated membership and explicit
    path/header selection; never trusted from arbitrary body fields.
  x-specification-version: 2.1.0
servers:
- url: /api/v1
security:
- bearerAuth: []
tags:
- name: Identity
- name: Inventory
- name: Media
- name: Listings
- name: CRM
- name: Deals
- name: Finance
- name: Payments
- name: Documents
- name: Exports
- name: Operations
- name: Configuration
- name: Settings
- name: Workflows
- name: Tax
- name: Calculations
- name: Reports
- name: Sessions
- name: Parties
paths:
  /me:
    get:
      summary: Get current profile, assurance, and memberships
      tags:
      - Identity
      responses:
        '200':
          description: Current user
      operationId: getMe
  /workspaces:
    get:
      summary: List accessible workspaces
      tags:
      - Identity
      responses:
        '200':
          description: Workspace list
      operationId: getWorkspaces
  /workspace-invitations:
    post:
      operationId: postWorkspaceInvitations
      summary: Create a workspace invitation and queue delivery
      tags:
      - Identity
      responses:
        '200':
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceInvitationCreatedEnvelope'
        '202':
          description: Invitation created and delivery queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceInvitationCreatedEnvelope'
        '400':
          description: Malformed request or command headers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden or recent MFA required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Idempotency or membership conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Invitation validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Command service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceInvitationCreateCommand'
  /workspace-invitations/accept:
    post:
      operationId: postWorkspaceInvitationsAccept
      summary: Accept an invitation for the authenticated confirmed identity
      tags:
      - Identity
      responses:
        '200':
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceInvitationAcceptedEnvelope'
        '201':
          description: Membership created from the invitation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceInvitationAcceptedEnvelope'
        '400':
          description: Malformed request or command headers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated or unconfirmed identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Identity does not match the invitation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Idempotency or existing-membership conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Invitation is invalid, expired, or no longer pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Command service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceInvitationAcceptCommand'
  /inventory-units:
    get:
      summary: List inventory units
      tags:
      - Inventory
      responses:
        '200':
          description: Permission-aware bounded inventory results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventorySearchEnvelope'
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Search validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Search service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      parameters:
      - &id001
        $ref: '#/components/parameters/WorkspaceId'
      - &id004
        $ref: '#/components/parameters/RequestId'
      - &id005
        $ref: '#/components/parameters/CorrelationId'
      - name: q
        in: query
        schema:
          type: string
          maxLength: 200
      - name: status
        in: query
        schema:
          type: array
          maxItems: 5
          uniqueItems: true
          items:
            enum:
            - draft
            - active
            - pending
            - closed
            - archived
      - name: location_id
        in: query
        schema:
          type: array
          maxItems: 20
          uniqueItems: true
          items:
            type: string
            format: uuid
      - name: minimum_price_minor
        in: query
        schema:
          type: string
          pattern: ^(?:0|[1-9][0-9]{0,18})$
      - name: maximum_price_minor
        in: query
        schema:
          type: string
          pattern: ^(?:0|[1-9][0-9]{0,18})$
      - name: minimum_days_in_stock
        in: query
        schema:
          type: integer
          minimum: 0
      - name: maximum_days_in_stock
        in: query
        schema:
          type: integer
          minimum: 0
      - name: cursor_rank
        in: query
        schema:
          type: number
          minimum: 0
      - name: cursor_updated_at
        in: query
        schema:
          type: string
          format: date-time
      - name: cursor_id
        in: query
        schema:
          type: string
          format: uuid
      - name: page_size
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
      operationId: getInventoryUnits
    post:
      summary: Create or safely link inventory from a confirmed durable VIN decode
      tags:
      - Inventory
      responses:
        '200':
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryUnitCreatedEnvelope'
        '201':
          description: Inventory created or safely linked to the existing open holding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryUnitCreatedEnvelope'
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Decode request unavailable in this workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Business validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Command service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryUnitCreateCommand'
      parameters:
      - *id001
      - &id003
        $ref: '#/components/parameters/IdempotencyKey'
      - *id004
      - *id005
      operationId: postInventoryUnits
  /inventory-units/{id}:
    get:
      summary: Get inventory unit
      tags:
      - Inventory
      responses:
        '200':
          description: Permission-aware inventory operations projection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryUnitOperationsEnvelope'
        '404':
          description: Not found
      parameters:
      - *id001
      - &id002
        $ref: '#/components/parameters/Id'
      operationId: getInventoryUnitsId
    patch:
      summary: Update inventory unit
      tags:
      - Inventory
      responses:
        '200':
          description: Updated or idempotently replayed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryDetailsUpdatedEnvelope'
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Business validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Command service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryDetailsUpdateCommand'
      parameters:
      - *id001
      - *id002
      - *id003
      - *id004
      - *id005
      operationId: patchInventoryUnitsId
  /inventory-units/{id}/transition:
    post:
      summary: Execute inventory workflow transition
      tags:
      - Inventory
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryWorkflowTransitionedEnvelope'
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Business validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Command service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryWorkflowTransitionCommand'
      parameters:
      - *id001
      - *id002
      - *id003
      - *id004
      - *id005
      operationId: postInventoryUnitsIdTransition
  /inventory-units/{id}/location-transfers:
    post:
      summary: Transfer an inventory unit to another location
      tags:
      - Inventory
      responses:
        '200':
          description: Transferred or idempotently replayed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryLocationTransferredEnvelope'
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Business validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Command service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryLocationTransferCommand'
      parameters:
      - *id001
      - *id002
      - *id003
      - *id004
      - *id005
      operationId: postInventoryUnitsIdLocationTransfers
  /vin/decode:
    post:
      summary: Queue durable VIN decoding and duplicate discovery
      tags:
      - Inventory
      responses:
        '200':
          description: Idempotent replay of the original request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VinDecodeRequestedEnvelope'
        '202':
          description: Decode request accepted for durable processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VinDecodeRequestedEnvelope'
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: VIN validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Command service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VinDecodeRequest'
      parameters:
      - *id001
      - *id003
      - *id004
      - *id005
      operationId: postVinDecode
  /vin/decode/{requestId}:
    get:
      summary: Read safe VIN decode, retry, and duplicate-review status
      tags:
      - Inventory
      responses:
        '200':
          description: Current durable decode status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VinDecodeStatusEnvelope'
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Decode request unavailable in this workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Identifier validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Query service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      parameters:
      - *id001
      - name: requestId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - *id004
      - *id005
      operationId: getVinDecodeRequest
  /vin/decode/{requestId}/retry:
    post:
      summary: Retry a visible failed VIN decode job
      tags:
      - Inventory
      responses:
        '200':
          description: Idempotent replay of the original retry command
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VinDecodeRetryEnvelope'
        '202':
          description: Retry accepted for durable processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VinDecodeRetryEnvelope'
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Decode request unavailable in this workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Job state or idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Retry validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Command service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      parameters:
      - *id001
      - name: requestId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - *id003
      - *id004
      - *id005
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VinDecodeRetryCommand'
      operationId: postVinDecodeRequestRetry
  /vin/decode/{requestId}/duplicate-review:
    post:
      summary: Record a reasoned VIN duplicate or reacquisition decision
      description: Open-inventory override additionally requires recent strong authentication.
      tags:
      - Inventory
      responses:
        '200':
          description: Idempotent replay of the original review command
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VinDuplicateReviewEnvelope'
        '201':
          description: Duplicate decision recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VinDuplicateReviewEnvelope'
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden or recent strong authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Decode request unavailable in this workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Review state or idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Duplicate decision validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Command service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      parameters:
      - *id001
      - name: requestId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - *id003
      - *id004
      - *id005
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VinDuplicateReviewCommand'
      operationId: postVinDecodeRequestDuplicateReview
  /vin/decode/{requestId}/manual-intake:
    post:
      summary: Create inventory from confirmed manual facts after terminal VIN decode failure
      description: The authoritative latest inventory.vin_decode job must be dead-lettered and unconsumed. Open-duplicate linkage additionally requires duplicate-override permission and recent strong authentication.
      tags:
      - Inventory
      responses:
        '200':
          description: Idempotent replay of the original manual intake
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VinManualInventoryIntakeEnvelope'
        '201':
          description: Manual facts consumed and inventory created or safely linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VinManualInventoryIntakeEnvelope'
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden or recent strong authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Decode request unavailable in this workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Decode job, request version, duplicate state, or idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Manual facts, location, condition, money, or stock configuration invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Command service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      parameters:
      - *id001
      - name: requestId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - *id003
      - *id004
      - *id005
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VinManualInventoryIntakeCommand'
      operationId: postVinDecodeRequestManualIntake
  /inventory-units/{id}/media/upload-intents:
    post:
      summary: Create media upload intent
      tags:

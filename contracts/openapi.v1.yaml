components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkspaceId:
      name: X-Workspace-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 200
    RequestId:
      name: X-Request-Id
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
  schemas:
    Error:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      - request_id
      - retryable
      properties:
        code:
          type: string
        message:
          type: string
        field_errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        request_id:
          type: string
        retryable:
          type: boolean
        details:
          type: object
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
      - error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkspaceId:
      name: X-Workspace-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 200
    RequestId:
      name: X-Request-Id
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
  schemas:
    Error:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      - request_id
      - retryable
      properties:
        code:
          type: string
        message:
          type: string
        field_errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        request_id:
          type: string
        retryable:
          type: boolean
        details:
          type: object
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
      - error
      properties:
        error:
          type: object
          additionalProperties: false
          required:
          - code
          - message
          properties:
            code:
              type: string
              minLength: 1
              maxLength: 120
            message:
              type: string
              minLength: 1
              maxLength: 500
    WorkspaceInvitationCreateCommand:
      type: object
      additionalProperties: false
      required:
      - email
      - expiresAt
      - requestedLocale
      - roleIds
      properties:
        email:
          type: string
          format: email
          minLength: 3
          maxLength: 320
        expiresAt:
          type: string
          format: date-time
        requestedLocale:
          type: string
          pattern: ^[A-Za-z]{2,3}(?:-[A-Za-z0-9]{2,8})*$
          minLength: 2
          maxLength: 64
        roleIds:
          type: array
          minItems: 1
          maxItems: 32
          uniqueItems: true
          items:
            type: string
            format: uuid
    WorkspaceInvitationCreatedEnvelope:
      type: object
      additionalProperties: false
      required:
      - data
      properties:
        data:
          type: object
          additionalProperties: false
          required:
          - invitationId
          - invitationStatus
          - jobId
          - jobStatus
          - outboxEventId
          - replayed
          properties:
            invitationId:
              type: string
              format: uuid
            invitationStatus:
              enum:
              - pending
            jobId:
              type: string
              format: uuid
            jobStatus:
              enum:
              - queued
              - running
              - retry_wait
              - succeeded
              - dead_letter
              - cancelled
            outboxEventId:
              type: string
              format: uuid
            replayed:
              type: boolean
    WorkspaceInvitationAcceptCommand:
      type: object
      additionalProperties: false
      required:
      - invitationId
      properties:
        invitationId:
          type: string
          format: uuid
    WorkspaceInvitationAcceptedEnvelope:
      type: object
      additionalProperties: false
      required:
      - data
      properties:
        data:
          type: object
          additionalProperties: false
          required:
          - invitationId
          - invitationStatus
          - membershipId
          - replayed
          properties:
            invitationId:
              type: string
              format: uuid
            invitationStatus:
              enum:
              - accepted
            membershipId:
              type: string
              format: uuid
            replayed:
              type: boolean
    InventoryUnitCreateCommand:
      type: object
      additionalProperties: false
      required:
      - conditionKey
      - confirmation
      - inventory
      - locationId
      - stockDefinitionId
      - vehicleFacts
      - vinDecodeRequestId
      properties:
        conditionKey:
          type: string
          minLength: 1
          maxLength: 100
          pattern: ^[a-z][a-z0-9_]*(?:\.[a-z][a-z0-9_]*)*$
        confirmation:
          type: object
          additionalProperties: false
          required:
          - accepted
          - expectedRequestVersion
          - vinDecodeResultId
          properties:
            accepted:
              const: true
            expectedRequestVersion:
              type: integer
              minimum: 1
              maximum: 9007199254740991
            vinDecodeResultId:
              type: string
              format: uuid
        inventory:
          type: object
          description: Mutable holding details for a new allocation. If duplicate review resolves to an already-open holding, acquisitionDate, advertisedPriceMinor, odometer, and publicNotes must all be null because the link does not modify that holding.
          additionalProperties: false
          required:
          - acquisitionDate
          - advertisedPriceMinor
          - currencyCode
          - odometer
          - publicNotes
          properties:
            acquisitionDate:
              type:
              - string
              - 'null'
              format: date
            advertisedPriceMinor:
              type:
              - string
              - 'null'
              pattern: ^(?:0|[1-9][0-9]{0,18})$
              x-maximum: '9223372036854775807'
            currencyCode:
              type: string
              pattern: ^[A-Z]{3}$
            odometer:
              oneOf:
              - type: 'null'
              - type: object
                additionalProperties: false
                required:
                - unit
                - value
                properties:
                  unit:
                    enum:
                    - km
                    - mi
                  value:
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
            publicNotes:
              type:
              - string
              - 'null'
              maxLength: 4000
        locationId:
          type: string
          format: uuid
        stockDefinitionId:
          type: string
          format: uuid
        vehicleFacts:
          type: object
          additionalProperties: false
          required:
          - bodyType
          - cylinders
          - drivetrain
          - engineLiters
          - fuelType
          - horsepower
          - make
          - model
          - modelYear
          - transmission
          - trimName
          properties:
            bodyType:
              type:
              - string
              - 'null'
              maxLength: 200
            cylinders:
              type:
              - integer
              - 'null'
              minimum: 1
              maximum: 64
            drivetrain:
              type:
              - string
              - 'null'
              maxLength: 100
            engineLiters:
              type:
              - string
              - 'null'
              pattern: ^\d{1,2}(?:\.\d{1,3})?$
            fuelType:
              type:
              - string
              - 'null'
              maxLength: 100
            horsepower:
              type:
              - integer
              - 'null'
              minimum: 1
              maximum: 10000
            make:
              type:
              - string
              - 'null'
              maxLength: 100
            model:
              type:
              - string
              - 'null'
              maxLength: 100
            modelYear:
              type:
              - integer
              - 'null'
              minimum: 1886
              maximum: 2200
            transmission:
              type:
              - string
              - 'null'
              maxLength: 200
            trimName:
              type:
              - string
              - 'null'
              maxLength: 200
        vinDecodeRequestId:
          type: string
          format: uuid
    InventoryUnitCreatedEnvelope:
      type: object
      additionalProperties: false
      required:
      - data
      properties:
        data:
          type: object
          additionalProperties: false
          required:
          - auditEventId
          - inventoryUnitId
          - linkedExistingOpenUnit
          - outboxEventId
          - replayed
          - stockNumber
          - vehicleId
          - vinDecodeRequestId
          - vinDecodeRequestVersion
          - vinInventoryIntakeId
          properties:
            auditEventId:
              type: string
              format: uuid
            inventoryUnitId:
              type: string
              format: uuid
            linkedExistingOpenUnit:
              type: boolean
              description: True when this request linked the already-open holding instead of allocating a new one.
            outboxEventId:
              type: string
              format: uuid
            replayed:
              type: boolean
            stockNumber:
              type: string
              minLength: 1
              maxLength: 200
            vehicleId:
              type: string
              format: uuid
            vinDecodeRequestId:
              type: string
              format: uuid
            vinDecodeRequestVersion:
              type: integer
              minimum: 1
              maximum: 9007199254740991
            vinInventoryIntakeId:
              type: string
              format: uuid
    VinManualInventoryIntakeCommand:
      type: object
      additionalProperties: false
      required:
      - conditionKey
      - confirmation

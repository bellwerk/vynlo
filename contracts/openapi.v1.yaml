    MediaUploadStatusEnvelope:
      type: object
      additionalProperties: false
      required:
      - data
      properties:
        data:
          type: object
          additionalProperties: false
          required:
          - completedAt
          - failure
          - job
          - mediaId
          - retryable
          - status
          - uploadSessionId
          properties:
            completedAt:
              type:
              - string
              - 'null'
              format: date-time
            failure:
              oneOf:
              - type: object
                additionalProperties: false
                required:
                - classification
                - code
                properties:
                  classification:
                    type:
                    - string
                    - 'null'
                    enum:
                    - transient
                    - rate_limited
                    - permanent
                    - validation
                    - permission
                    - provider_auth
                    - unknown
                    - lease_expired
                    - null
                  code:
                    type:
                    - string
                    - 'null'
                    minLength: 1
                    maxLength: 120
                    pattern: ^[a-z][a-z0-9_.-]{0,119}$
              - type: 'null'
            job:
              description: Null only before the first verification request.
              oneOf:
              - type: object
                additionalProperties: false
                required:
                - attemptCount
                - id
                - maximumAttempts
                - retryAt
                properties:
                  attemptCount:
                    type: integer
                    minimum: 0
                  id:
                    type: string
                    format: uuid
                  maximumAttempts:
                    type: integer
                    minimum: 1
                    maximum: 32
                  retryAt:
                    type:
                    - string
                    - 'null'
                    format: date-time
              - type: 'null'
            mediaId:
              type: string
              format: uuid
            retryable:
              description: True only while the exact active verification job is dead-letter and both the upload and media remain active.
              type: boolean
            status:
              enum:
              - awaiting_upload
              - queued
              - running
              - retry_wait
              - dead_letter
              - rejected
              - completed
            uploadSessionId:
              type: string
              format: uuid

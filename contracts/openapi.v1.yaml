              maxLength: 200
            cylinders:
              type:
              - integer
              - 'null'
              minimum: 1
              maximum: 64
            drivetrain:
              type:
              - string
              - 'null'
              maxLength: 100
            engineLiters:
              type:
              - string
              - 'null'
              pattern: ^\d{1,2}(?:\.\d{1,3})?$
            fuelType:
              type:
              - string
              - 'null'
              maxLength: 100
            horsepower:
              type:
              - integer

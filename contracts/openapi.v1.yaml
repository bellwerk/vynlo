              minimum: 1
              maximum: 10000
            make:
              type: string
              minLength: 1
              maxLength: 100
            model:
              type: string
              minLength: 1
              maxLength: 100
            modelYear:
              type: integer
              minimum: 1886
              maximum: 2200
            transmission:
              type:
              - string
              - 'null'
              maxLength: 200
            trimName:
              type:
              - string
              - 'null'
              maxLength: 200

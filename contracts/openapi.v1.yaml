        manualReason:
          type: string
          minLength: 1
          maxLength: 2000
        stockDefinitionId:
          type: string
          format: uuid
        vehicleFacts:
          type: object
          additionalProperties: false
          required:
          - bodyType
          - cylinders
          - drivetrain
          - engineLiters
          - fuelType
          - horsepower
          - make

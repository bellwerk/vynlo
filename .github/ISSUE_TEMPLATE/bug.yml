name: Bug report
about: Report a reproducible defect without including production-sensitive data
labels: ["bug"]
body:
  - type: checkboxes
    id: privacy
    attributes:
      label: Data safety
      options:
        - label: I removed customer data, credentials, signed documents, and private provider identifiers.
          required: true
  - type: input
    id: environment
    attributes:
      label: Environment and build/version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps using synthetic or redacted data
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Workspace isolation, permissions, financial, document, or integration impact
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized logs, correlation IDs, screenshots, or test case

name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate

      - name: Install dependencies from lockfile
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Specification and schemas
        run: pnpm check:spec

      - name: OpenAPI
        run: pnpm check:openapi

      - name: Markdown links
        run: pnpm check:markdown

      - name: Package boundaries and secrets
        run: pnpm test:security

      - name: Supabase tenancy foundation structure
        run: pnpm check:supabase

      - name: Dependency audit
        run: pnpm check:deps

      - name: Build applications
        run: pnpm build

      - name: Upload web build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-build
          path: apps/web/.next
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

      - name: Browser tests
        run: pnpm test:e2e

  database-smoke:
    name: database-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate

      - name: Install dependencies from lockfile
        run: pnpm install --frozen-lockfile

      - name: Start local Supabase
        run: pnpm supabase:start

      - name: Reset and seed local database
        run: pnpm db:reset

      - name: Tenancy, permission, and RLS negative matrix
        run: pnpm test:db

      - name: Verify executed Milestone 1 fixtures
        run: pnpm check:supabase:runtime

      - name: Stop local Supabase
        if: always()
        run: pnpm exec supabase stop --no-backup

schema_version: "1.0"
deal_type:
  key: acquisition.trade_in
  version: "1.0.0"
  labels:
    en: Trade-in acquisition
    fr: Acquisition d'un véhicule d'échange
  option_labels:
    participant_roles:
      trade_in_owner: { en: Trade-in owner, fr: Propriétaire du véhicule d’échange }
      dealer_buyer: { en: Dealer buyer, fr: Acheteur du concessionnaire }
      lender: { en: Lender, fr: Prêteur }
      authorized_representative: { en: Authorized representative, fr: Représentant autorisé }
    inventory_roles:
      trade_in: { en: Trade-in vehicle, fr: Véhicule d’échange }
    one_time_event_types:
      trade_in_credit: { en: Trade-in credit, fr: Crédit d’échange }
      balance_received: { en: Balance received, fr: Solde reçu }
  workflow:
    key: retail_deal_standard
    version: "1.0.0"
    checksum: 0855356701f9c095a7683a7e9813bc1cb55cd20f58376055e610b96d4b209214
  allowed_participant_roles:
    - trade_in_owner
    - dealer_buyer
    - lender
    - authorized_representative
  allowed_inventory_roles:

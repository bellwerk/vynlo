schema_version: "1.1"
export:
  key: inventory_summary
  version: "1.1.0"
  labels: { en: Inventory summary, fr: Sommaire de lâ€™inventaire }
  entity: inventory_unit
  formats: [csv, xlsx]
  columns:
    - key: stock_number
      labels: { en: Stock number, fr: NumÃ©ro de stock }
      source: inventory_unit.stock_number
      format: text
    - key: vin
      labels: { en: VIN, fr: NIV }
      source: vehicle.vin
      format: text
    - key: model_year
      labels: { en: Year, fr: AnnÃ©e }
      source: vehicle.model_year
      format: integer
    - key: make
      labels: { en: Make, fr: Marque }
      source: vehicle.make
      format: text
    - key: model
      labels: { en: Model, fr: ModÃ¨le }
      source: vehicle.model
